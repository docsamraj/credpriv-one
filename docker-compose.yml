services:
  postgres:
    image: postgres:16-alpine
    container_name: credpriv-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: credpriv
    volumes:
      - credpriv_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d credpriv"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  credpriv_pgdata:
