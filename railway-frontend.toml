# @credpriv/frontend — Railway Root Directory MUST be / (repo root)
# Settings → Root Directory: / (clear "frontend" if set)
# Settings → Config-as-code: railway-frontend.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# WORKDIR in image is /app/frontend (monorepo standalone layout)
startCommand = "node server.js"
healthcheckPath = "/login"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
