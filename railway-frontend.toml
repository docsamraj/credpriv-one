# @credpriv/frontend — Railway Root Directory MUST be / (repo root)
# Settings → Root Directory: / (clear "frontend" if set)
# Settings → Config-as-code: railway-frontend.toml

[build]
builder = "NIXPACKS"
buildCommand = "npm ci --ignore-scripts && npm run build --workspace=@credpriv/shared && NODE_ENV=production npm run build --workspace=@credpriv/frontend"

[deploy]
startCommand = "npm run start --workspace=@credpriv/frontend"
healthcheckPath = "/login"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
