# @credpriv/frontend — Railway Root Directory MUST be / (repo root)
# Settings → Root Directory: / (clear "frontend" if set)
# Settings → Config-as-code: railway-frontend.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Absolute path — Railway startCommand may not honor Dockerfile WORKDIR
startCommand = "node /app/frontend/server.js"
healthcheckPath = "/login"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
